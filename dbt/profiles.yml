wikipedia_page_activity:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_PG_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_PG_USER', 'dbt') }}"
      password: "{{ env_var('DBT_PG_PASSWORD', 'dbtpassword') }}"
      dbname: "{{ env_var('DBT_PG_DATABASE', 'wikipedia') }}"
      schema: "{{ env_var('DBT_PG_SCHEMA', 'public') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      keepalives_idle: 0
      connect_timeout: 10
      sslmode: "{{ env_var('DBT_PG_SSLMODE', 'disable') }}"
