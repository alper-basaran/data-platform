apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
          - --console-address
          - ":9001"
        env:
          - name: MINIO_ROOT_USER
            valueFrom:
              secretKeyRef:
                name: ns-secrets
                key: MINIO_ROOT
          - name: MINIO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ns-secrets
                key: MINIO_ROOT_PW
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
          - containerPort: 9000
          - containerPort: 9001

---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector:
    app: minio
  type: NodePort # TODO: demo-only host exposure for reproducability; keep ClusterIP + Ingress in production.
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: ui
      port: 9001
      targetPort: 9001
      nodePort: 30901