apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
data:
  init.sh: |
    #!/bin/bash
    set -e
    
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE DATABASE bronze;
    EOSQL
    
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname=bronze -v appuser="$LOAD_USER" -v pw="$LOAD_PASSWORD" <<-EOSQL
      CREATE USER :appuser WITH PASSWORD :'pw';
      GRANT CONNECT ON DATABASE bronze TO :appuser;
      GRANT USAGE ON SCHEMA public TO :appuser;
      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO :appuser;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO :appuser;    
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname=postgres -v airflow_user="$AIRFLOW_USER" -v airflow_pw="$AIRFLOW_PASSWORD" -v airflow_db="$AIRFLOW_DB" <<-EOSQL
      CREATE USER :"airflow_user" WITH PASSWORD :'airflow_pw';
      CREATE DATABASE :"airflow_db" OWNER :"airflow_user";
    EOSQL

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_PASSWORD
        - name: POSTGRES_DB
          value: "postgres"
        - name: LOAD_USER
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_LOAD_USER
        - name: LOAD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_LOAD_PW
        - name: AIRFLOW_USER
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_AIRFLOW_USER
        - name: AIRFLOW_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_AIRFLOW_PW
        - name: AIRFLOW_DB
          valueFrom:
            secretKeyRef:
              name: ns-secrets
              key: PG_AIRFLOW_DB
        resources:
          requests:
            cpu: 150m
            memory: 256Mi
          limits:
            cpu: 750m
            memory: 1Gi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
        - mountPath: /docker-entrypoint-initdb.d
          name: init-scripts
      volumes:
      - name: postgres-data        
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  type: NodePort # TODO: demo-only host exposure; keep ClusterIP for production internal DB access.
  ports:
  - port: 5432
    targetPort: 5432
    nodePort: 30432
